site_name: Stake — Planning Docs
site_description: Commitment-based digital discipline app — planning & architecture
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Home: README.md
  - "Phase 1 — Product & Feasibility":
      - Product Requirements (PRD): product/prd.md
      - Platform Feasibility Matrix: architecture/platform-feasibility.md
      - Anti-Cheating & Threat Model: architecture/anti-cheating.md
  - "Phase 2 — Payments, System & Data":
      - Payment Architecture: payments/payment-architecture.md
      - System Design & Stack: architecture/system_design.md
      - Database Schema (DDL): database/schema.md
  - "Phase 3 — API & Security":
      - REST API Specification: api/rest-api-spec.md
      - Security Framework: api/security-framework.md
  - "Phase 4 — Contracts & High-Risk Areas":
      - OpenAPI 3.1 Contract: api/openapi.yaml
      - Native Enforcement Modules: native/enforcement-modules.md
      - Ledger & State-Machine Workers: backend/ledger-workers.md
  - "Ops & Delivery":
      - Operations & SRE Plan: ops/sre-plan.md
      - Project Plan & Delivery Cutline: project/delivery-plan.md
