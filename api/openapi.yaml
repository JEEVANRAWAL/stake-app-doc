openapi: 3.1.0
info:
  title: Stake API
  version: 1.0.0
  description: >
    Commitment-based digital discipline platform. The device is treated as
    untrusted; the server is the sole authority for time, balances, rule state,
    and unlock grants. All money-moving endpoints are idempotent and require
    request signing.
  contact: { name: Stake Platform, email: api@stakeapp.io }
servers:
  - url: https://api.stakeapp.io/v1
    description: Production
  - url: https://sandbox.api.stakeapp.io/v1
    description: Sandbox

tags:
  - { name: Auth }
  - { name: Devices }
  - { name: Usage }
  - { name: Unlocks }
  - { name: Wallet }
  - { name: Withdrawals }
  - { name: Deposits }
  - { name: Rules }
  - { name: RestrictedApps }
  - { name: Webhooks }

security:
  - bearerAuth: []

paths:

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain device-bound tokens
      security: []
      parameters: [ { $ref: '#/components/parameters/DeviceId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Problem' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token, issue new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties: { refresh_token: { type: string } }
            example: { refresh_token: rt_9f2c8a4b1e7d }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } }
          description: Rotated
        '401': { $ref: '#/components/responses/Problem' }

  /devices:
    post:
      tags: [Devices]
      summary: Register or update a device
      parameters:
        - { $ref: '#/components/parameters/DeviceAttestation' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceRegistration' }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceRegistrationResult' }
        '422': { $ref: '#/components/responses/Problem' }

  /devices/{deviceId}/heartbeat:
    post:
      tags: [Devices]
      summary: Anti-tamper heartbeat (clock, permissions, integrity, enforcement)
      parameters:
        - { $ref: '#/components/parameters/DeviceIdPath' }
        - { $ref: '#/components/parameters/SignatureHeader' }
        - { $ref: '#/components/parameters/TimestampHeader' }
        - { $ref: '#/components/parameters/NonceHeader' }
        - { $ref: '#/components/parameters/DeviceAttestation' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HeartbeatRequest' }
      responses:
        '200':
          description: Acknowledged with server verdict and actions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '409':
          description: Replay or stale signature
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  /usage/sync:
    post:
      tags: [Usage]
      summary: Batch-sync raw usage events (untrusted until reconciled)
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/SignatureHeader' }
        - { $ref: '#/components/parameters/TimestampHeader' }
        - { $ref: '#/components/parameters/NonceHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UsageSyncRequest' }
      responses:
        '202':
          description: Accepted for async aggregation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSyncResult' }
        '401': { $ref: '#/components/responses/Problem' }

  /unlock-requests:
    post:
      tags: [Unlocks]
      summary: Request a paid temporary unlock during a restriction
      parameters:
        - { $ref: '#/components/parameters/IdempotencyKey' }
        - { $ref: '#/components/parameters/SignatureHeader' }
        - { $ref: '#/components/parameters/TimestampHeader' }
        - { $ref: '#/components/parameters/NonceHeader' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UnlockRequestCreate' }
      responses:
        '200':
          description: Granted (wallet funded) — signed authorization token returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UnlockGranted' }
        '402':
          description: Insufficient wallet balance — funding required
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UnlockFundingRequired' }
        '409': { $ref: '#/components/responses/Problem' }

  /unlock-requests/{id}/applied:
    post:
      tags: [Unlocks]
      summary: Native module confirms the shield was lifted
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [applied_at, shield_lifted]
              properties:
                applied_at: { type: string, format: date-time }
                shield_lifted: { type: boolean }
            example: { applied_at: "2026-06-12T04:10:03Z", shield_lifted: true }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { $ref: '#/components/schemas/UnlockStatus' }
                  expires_at: { type: string, format: date-time }
              example: { status: granted, expires_at: "2026-06-12T04:15:02Z" }
          description: Recorded

  /wallet:
    get:
      tags: [Wallet]
      summary: Get wallet balances
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/Wallet' } } }
          description: Wallet

  /wallet/topup:
    post:
      tags: [Wallet]
      summary: Create a wallet top-up via a payment provider
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TopupCreate' }
      responses:
        '201':
          description: Payment intent created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }

  /wallet/withdrawals:
    post:
      tags: [Withdrawals]
      summary: Request a withdrawal (two-phase hold; KYC-gated; gross-down fee)
      description: >
        Holds funds (user_available → user_payout_pending) and queues for review/disbursement.
        Payout posts only when confirmed paid. Requires KYC ≥ tier 1 and a bank-name match.
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WithdrawalCreate' }
            example:
              amount: "500.0000"
              currency: NPR
              destination:
                bank_code: NICENPKA
                account_no: "0123010000123"
                account_name: Jeevan Rawal
      responses:
        '201':
          description: Funds held, queued for review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Withdrawal' }
              example:
                withdrawal_id: 3c91aa12-7b2a-4f10-9d22-0a1b2c3d4e5f
                status: under_review
                amount: "500.0000"
                fee_amount: "10.0000"
                payout_amount: "490.0000"
                currency: NPR
                wallet:
                  available_balance: "0.0000"
                  locked_balance: "200.0000"
                  payout_pending_balance: "500.0000"
                  currency: NPR
                ledger_journal_id: 88d4c2aa-1111-4222-8333-444455556666
                estimated_completion: "1-2 business days"
                requested_at: "2026-06-12T04:20:00Z"
        '403':
          description: KYC / bank-name verification required (WITHDRAWAL_KYC_REQUIRED)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              example:
                type: https://api.stakeapp.io/errors/withdrawal-kyc-required
                code: WITHDRAWAL_KYC_REQUIRED
                title: Identity verification required before withdrawal
                status: 403
                detail: A bank-account name match (KYC tier 1) is required before your first payout.
                instance: /v1/wallet/withdrawals
                meta: { required_tier: 1 }
        '409':
          description: Insufficient available balance, below minimum, or over velocity cap
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              example:
                type: https://api.stakeapp.io/errors/insufficient-available-balance
                code: INSUFFICIENT_AVAILABLE_BALANCE
                title: Amount exceeds withdrawable balance
                status: 409
                detail: Only settled, un-staked funds are withdrawable.
                instance: /v1/wallet/withdrawals
                meta: { available_balance: "300.0000" }

  /wallet/withdrawals/{id}:
    get:
      tags: [Withdrawals]
      summary: Get a withdrawal's status
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200':
          description: Withdrawal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Withdrawal' }
              example:
                withdrawal_id: 3c91aa12-7b2a-4f10-9d22-0a1b2c3d4e5f
                status: paid
                amount: "500.0000"
                fee_amount: "10.0000"
                payout_amount: "490.0000"
                currency: NPR
                provider: manual_bank
                disburse_reference: BNK-20260613-0042
                requested_at: "2026-06-12T04:20:00Z"
                approved_at: "2026-06-12T05:00:00Z"
                paid_at: "2026-06-13T09:10:00Z"
        '404': { $ref: '#/components/responses/Problem' }

  /wallet/withdrawals/{id}/cancel:
    post:
      tags: [Withdrawals]
      summary: Cancel a withdrawal (only before processing); releases the hold
      parameters: [ { $ref: '#/components/parameters/IdPath' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses:
        '200':
          description: Cancelled, hold released
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal_id: { type: string, format: uuid }
                  status: { $ref: '#/components/schemas/WithdrawalStatus' }
                  wallet: { $ref: '#/components/schemas/Wallet' }
              example:
                withdrawal_id: 3c91aa12-7b2a-4f10-9d22-0a1b2c3d4e5f
                status: cancelled
                wallet:
                  available_balance: "500.0000"
                  locked_balance: "200.0000"
                  payout_pending_balance: "0.0000"
                  currency: NPR
        '409':
          description: Already in/after processing (WITHDRAWAL_NOT_CANCELLABLE)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              example:
                type: https://api.stakeapp.io/errors/withdrawal-not-cancellable
                code: WITHDRAWAL_NOT_CANCELLABLE
                title: Withdrawal can no longer be cancelled
                status: 409
                detail: A disbursement is already in flight.
                instance: /v1/wallet/withdrawals/3c91aa12-7b2a-4f10-9d22-0a1b2c3d4e5f/cancel

  /commitment-deposits:
    post:
      tags: [Deposits]
      summary: Lock a stake from available balance (Option C)
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepositCreate' }
      responses:
        '201':
          content: { application/json: { schema: { $ref: '#/components/schemas/Deposit' } } }
          description: Staked
        '402':
          description: Below minimum stake or insufficient funds to back the commitment
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              example:
                type: https://api.stakeapp.io/errors/commitment-funding-required
                code: COMMITMENT_FUNDING_REQUIRED
                title: Minimum funding required to create a commitment
                status: 402
                detail: A commitment must be backed by at least NPR 200.00 of available balance.
                instance: /v1/commitment-deposits
                meta:
                  minimum: "200.0000"
                  available_balance: "0.0000"
                  shortfall: "200.0000"
                  topup_endpoint: /v1/wallet/topup
    get:
      tags: [Deposits]
      summary: List the caller's deposits
      parameters: [ { $ref: '#/components/parameters/StatusFilter' } ]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Deposit' }
          description: Deposits

  /commitment-breaks:
    post:
      tags: [Rules]
      summary: Pay a commitment-break fee, returns a single-use break token
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, target_id]
              properties:
                reason:
                  type: string
                  enum: [increase_limit, disable_limit, remove_app]
                target_id: { type: string, format: uuid }
            example: { reason: increase_limit, target_id: 0c2b1100-0000-4000-8000-000000000008 }
      responses:
        '200':
          description: Fee paid, break token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  break_token: { type: string }
                  fee: { $ref: '#/components/schemas/MoneyAmount' }
                  expires_at: { type: string, format: date-time }
              example: { break_token: brk_7c2a91, fee: { amount: "50.0000", currency: NPR }, expires_at: "2026-06-12T05:10:02Z" }
        '402': { $ref: '#/components/responses/Problem' }

  /screen-time-rules/{id}/limit:
    patch:
      tags: [Rules]
      summary: Change a daily limit (decrease free; increase requires break_token)
      parameters: [ { $ref: '#/components/parameters/IdPath' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [daily_limit_seconds]
              properties:
                daily_limit_seconds: { type: integer, minimum: 0 }
                break_token: { type: string, description: Required when increasing/disabling }
            example: { daily_limit_seconds: 2700, break_token: brk_7c2a91 }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/ScreenTimeRule' } } }
          description: Updated
        '409':
          description: Increase forbidden without payment
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  /user-restricted-apps:
    get:
      tags: [RestrictedApps]
      summary: List restricted apps
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserRestrictedApp' }
          description: List
    post:
      tags: [RestrictedApps]
      summary: Add an app to the restriction list (arms a penalty-bearing commitment)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserRestrictedAppCreate' }
      responses:
        '201':
          content: { application/json: { schema: { $ref: '#/components/schemas/UserRestrictedApp' } } }
          description: Added
        '402':
          description: Wallet not funded to the minimum commitment backing
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
              example:
                type: https://api.stakeapp.io/errors/commitment-funding-required
                code: COMMITMENT_FUNDING_REQUIRED
                title: Minimum funding required to create a commitment
                status: 402
                detail: Fund at least NPR 200.00 of available balance before arming a commitment.
                instance: /v1/user-restricted-apps
                meta: { minimum: "200.0000", available_balance: "0.0000", topup_endpoint: /v1/wallet/topup }

  /user-restricted-apps/{id}:
    delete:
      tags: [RestrictedApps]
      summary: Remove an app (requires break_token; effective after active window)
      parameters: [ { $ref: '#/components/parameters/IdPath' }, { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [break_token]
              properties: { break_token: { type: string } }
            example: { break_token: brk_7c2a91 }
      responses:
        '200':
          description: Scheduled for removal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { $ref: '#/components/schemas/RuleStatus' }
                  removed_at: { type: string, format: date-time, nullable: true }
              example: { status: removed, removed_at: "2026-06-15T00:00:00Z" }
        '402': { $ref: '#/components/responses/Problem' }

  /webhooks/{provider}:
    post:
      tags: [Webhooks]
      summary: Provider payment webhook receiver (signature-gated, not JWT)
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { $ref: '#/components/schemas/PaymentProvider' }
      requestBody:
        required: true
        description: Raw provider payload; signature verified on the unparsed body.
        content:
          application/json: { schema: { type: object, additionalProperties: true } }
      responses:
        '200': { description: Acknowledged (idempotent) }
        '400': { description: Signature verification failed }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DeviceId:
      name: X-Device-Id
      in: header
      required: true
      schema: { type: string, format: uuid }
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
    SignatureHeader:
      name: X-Signature
      in: header
      required: true
      schema: { type: string }
      description: base64 HMAC-SHA256 over METHOD\nPATH\nX-Timestamp\nX-Nonce\nsha256(body)
    TimestampHeader:
      name: X-Timestamp
      in: header
      required: true
      schema: { type: string, format: date-time }
    NonceHeader:
      name: X-Nonce
      in: header
      required: true
      schema: { type: string, description: 128-bit random, single-use }
    DeviceAttestation:
      name: X-Device-Attestation
      in: header
      required: false
      schema: { type: string, description: Play Integrity / App Attest token }
    StatusFilter:
      name: status
      in: query
      required: false
      schema: { type: string }

  responses:
    Problem:
      description: RFC-9457 problem
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:

    Money:
      type: string
      pattern: '^-?\d{1,10}(\.\d{1,4})?$'
      description: Decimal string, 4 dp. Never a float.
      example: "50.0000"
    Currency:
      type: string
      minLength: 3
      maxLength: 3
      example: NPR
    OsPlatform: { type: string, enum: [android, ios] }
    PaymentProvider:
      type: string
      enum: [stripe, esewa, khalti, fonepay, apple_iap, google_iap, wallet_internal, connectips, manual_bank]
    WithdrawalStatus:
      type: string
      enum: [requested, under_review, approved, processing, paid, rejected, failed, cancelled]
    PaymentStatus:
      type: string
      enum: [initiated, pending, authorized, succeeded, failed, cancelled, refunded, partially_refunded, disputed]
    DepositStatus:
      type: string
      enum: [active, completed_returned, forfeited, partially_forfeited, cancelled]
    RuleStatus: { type: string, enum: [active, paused, removed] }
    CooldownState:
      type: string
      enum: [none, limit_reached, in_paid_unlock, locked_window]
    UnlockStatus:
      type: string
      enum: [requested, payment_pending, granted, expired, denied]
    ViolationType:
      type: string
      enum: [schedule_block, time_limit_reached, permission_revoked, force_stop, app_uninstalled, clock_tamper, clone_detected]
    ClockVerdict: { type: string, enum: [ok, warn, tamper_suspected] }
    ProtectionStatus: { type: string, enum: [healthy, degraded, unprotected] }

    MoneyAmount:
      type: object
      required: [amount, currency]
      properties:
        amount: { $ref: '#/components/schemas/Money' }
        currency: { $ref: '#/components/schemas/Currency' }

    Problem:
      type: object
      required: [type, code, title, status]
      properties:
        type: { type: string, format: uri }
        code: { type: string, example: RULE_INCREASE_FORBIDDEN }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        meta: { type: object, additionalProperties: true }

    LoginRequest:
      type: object
      required: [provider]
      properties:
        provider: { type: string, enum: [password, google, apple, phone_otp] }
        email: { type: string, format: email }
        phone_e164: { type: string }
        password: { type: string }
        oauth_code: { type: string }
        otp: { type: string }
      example:
        provider: phone_otp
        phone_e164: "+9779812345678"
        otp: "418209"
    TokenPair:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, default: Bearer }
        expires_in: { type: integer, example: 600 }
      example:
        access_token: eyJhbGciOiJFZERTQSJ9.eyJzdWIiOiJ1XzkxYSJ9.sig
        refresh_token: rt_9f2c8a4b1e7d
        token_type: Bearer
        expires_in: 600

    DevicePermissions:
      type: object
      properties:
        accessibility_granted: { type: boolean }
        usage_access_granted: { type: boolean }
        overlay_granted: { type: boolean }
        family_controls_granted: { type: boolean }
        battery_optimized: { type: boolean }
    Attestation:
      type: object
      required: [type, token]
      properties:
        type: { type: string, enum: [play_integrity, app_attest, device_check] }
        token: { type: string }
    DeviceRegistration:
      type: object
      required: [os_platform, app_version, hardware_id_hash]
      properties:
        os_platform: { $ref: '#/components/schemas/OsPlatform' }
        os_version: { type: string }
        app_version: { type: string }
        device_model: { type: string }
        hardware_id_hash: { type: string }
        push_token: { type: string }
        push_provider: { type: string, enum: [fcm, apns] }
        permissions: { $ref: '#/components/schemas/DevicePermissions' }
        attestation: { $ref: '#/components/schemas/Attestation' }
      example:
        os_platform: android
        os_version: "15"
        app_version: 1.4.2
        device_model: Pixel 8
        hardware_id_hash: b8e5c2a1f09d4471aa33bc01e5f7a2d8
        push_token: fcm:dQw4w9WgXcQ
        push_provider: fcm
        permissions:
          accessibility_granted: true
          usage_access_granted: true
          overlay_granted: true
          family_controls_granted: false
          battery_optimized: false
        attestation:
          type: play_integrity
          token: eyJ...PlayIntegrityJWT
    DeviceRegistrationResult:
      type: object
      properties:
        device_id: { type: string, format: uuid }
        integrity_verified: { type: boolean }
        protection_status: { $ref: '#/components/schemas/ProtectionStatus' }
        heartbeat_interval_seconds: { type: integer }
        signing_key_id: { type: string }
        server_time: { type: string, format: date-time }
      example:
        device_id: 5f3a2c10-9b1e-4a77-8d2c-1f0e9a7b6c54
        integrity_verified: true
        protection_status: healthy
        heartbeat_interval_seconds: 60
        signing_key_id: dk_2026_06_a
